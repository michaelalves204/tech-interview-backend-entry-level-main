version: "3"

services:
  db:
    image: postgres:16-alpine
    container_name: myapp_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres13:/var/lib/postgresql/data
  redis:
    image: redis:7.0.15-alpine
    container_name: myapp_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  web:
    container_name: myapp_api
    build: .
    command: ./bin/rails server -b 0.0.0.0
    volumes:
      - .:/rails
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/myapp_development
      REDIS_URL: redis://redis:6379/0
  # test:
  #   build: .
  #   command: bash -c "bundle exec rails db:prepare && bundle exec rspec"
  #   volumes:
  #     - .:/rails
  #   depends_on:
  #     - db
  #     - redis
  #   environment:
  #     DATABASE_URL: postgresql://postgres:password@db:5432/myapp_test
  #     REDIS_URL: redis://redis:6379/0
volumes:
  postgres13:
  redis_data:
